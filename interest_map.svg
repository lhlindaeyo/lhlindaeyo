<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- 중심: 250,250 / 최대반지름: 160 -->
  <circle cx="250" cy="250" r="160" stroke="#e5e7eb" stroke-width="0.8"/>
  <circle cx="250" cy="250" r="107" stroke="#e5e7eb" stroke-width="0.8"/>
  <circle cx="250" cy="250" r="53"  stroke="#e5e7eb" stroke-width="0.8"/>

  <line x1="250" y1="90"  x2="250" y2="410" stroke="#e5e7eb" stroke-width="0.8"/>
  <line x1="90"  y1="250" x2="410" y2="250" stroke="#e5e7eb" stroke-width="0.8"/>
  <line x1="137" y1="137" x2="363" y2="363" stroke="#e5e7eb" stroke-width="0.8"/>
  <line x1="363" y1="137" x2="137" y2="363" stroke="#e5e7eb" stroke-width="0.8"/>

  <!-- 8축 폴리곤: 각 축 값(0~1) × 160 -->
  <!-- N=MacroShock(0.95=152), NE=FinStatement(0.90=144), E=AudioFinance(0.85=136), SE=StockPred(1.0=160) -->
  <!-- S=CausalInf(0.90=144), SW=CS(0.65=104), W=Finance(0.80=128), NW=ML/DL(0.80=128) -->
  <!-- 각도: N=270°, NE=315°, E=0°, SE=45°, S=90°, SW=135°, W=180°, NW=225° -->
  <!-- x = 250 + r*cos(θ), y = 250 + r*sin(θ) -->
  <!-- N:   250 + 152*cos(270°) = 250+0=250,   250+152*sin(270°)=250-152=98   -->
  <!-- NE:  250 + 144*cos(315°) = 250+101.8=352, 250+144*sin(315°)=250-101.8=148 -->
  <!-- E:   250 + 136*cos(0°)   = 386, 250                                       -->
  <!-- SE:  250 + 160*cos(45°)  = 363, 363                                       -->
  <!-- S:   250 + 144*cos(90°)  = 250, 394                                       -->
  <!-- SW:  250 + 104*cos(135°) = 176, 324                                       -->
  <!-- W:   250 + 128*cos(180°) = 122, 250                                       -->
  <!-- NW:  250 + 128*cos(225°) = 160, 160                                       -->
  <polygon
    points="250,98 352,148 386,250 363,363 250,394 176,324 122,250 160,160"
    fill="#1d4ed8" fill-opacity="0.08" stroke="#1d4ed8" stroke-width="1.5"/>

  <circle cx="250" cy="98"  r="4" fill="#1d4ed8"/>
  <circle cx="352" cy="148" r="4" fill="#1d4ed8"/>
  <circle cx="386" cy="250" r="4" fill="#1d4ed8"/>
  <circle cx="363" cy="363" r="4" fill="#1d4ed8"/>
  <circle cx="250" cy="394" r="4" fill="#1d4ed8"/>
  <circle cx="176" cy="324" r="4" fill="#1d4ed8"/>
  <circle cx="122" cy="250" r="4" fill="#1d4ed8"/>
  <circle cx="160" cy="160" r="4" fill="#1d4ed8"/>

  <!-- 라벨: 점에서 20px 더 바깥 -->
  <text x="250" y="72"  text-anchor="middle" font-size="12" fill="#374151" font-family="monospace">Macro Shock</text>
  <text x="362" y="130" text-anchor="start"  font-size="12" fill="#374151" font-family="monospace">Fin Statement</text>
  <text x="396" y="254" text-anchor="start"  font-size="12" fill="#374151" font-family="monospace">Audio Finance</text>
  <text x="374" y="382" text-anchor="start"  font-size="12" fill="#374151" font-family="monospace">Stock Pred</text>
  <text x="250" y="426" text-anchor="middle" font-size="12" fill="#374151" font-family="monospace">Causal Inf</text>
  <text x="162" y="344" text-anchor="end"    font-size="12" fill="#374151" font-family="monospace">CS</text>
  <text x="100" y="254" text-anchor="end"    font-size="12" fill="#374151" font-family="monospace">Finance</text>
  <text x="145" y="144" text-anchor="end"    font-size="12" fill="#374151" font-family="monospace">ML / DL</text>

  <circle cx="250" cy="250" r="3" fill="#1d4ed8"/>
</svg>
